<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKS Demo Shop</title>
    <style>
        :root { --primary: #2e7d32; --bg: #f4f4f4; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 1rem 2rem; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 20px; }
        .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 8px; text-align: center; }
        .card button { background: var(--primary); color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
        .cart { background: white; padding: 20px; border-radius: 8px; height: fit-content; }
        ul { list-style: none; padding: 0; }
        li { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <h1>🌿 AKS Plant Shop</h1>
    <div>Items in Cart: <span id="cart-count">0</span></div>
</header>

<div class="container">
    <div class="products">
        <div class="card">
            <h3>Monstera</h3>
            <p>$25</p>
            <button onclick="addToCart('Monstera', 25)">Add to Cart</button>
        </div>
        <div class="card">
            <h3>Snake Plant</h3>
            <p>$15</p>
            <button onclick="addToCart('Snake Plant', 15)">Add to Cart</button>
        </div>
        <div class="card">
            <h3>Aloe Vera</h3>
            <p>$10</p>
            <button onclick="addToCart('Aloe Vera', 10)">Add to Cart</button>
        </div>
    </div>

    <div class="cart">
        <h2>Your Cart</h2>
        <ul id="cart-items"></ul>
        <hr>
        <p><strong>Total: $<span id="total-price">0</span></strong></p>
        <button style="width:100%; padding:10px;" onclick="alert('Checkout demo complete!')">Checkout</button>
    </div>
</div>

<script>
    let cart = [];
    let total = 0;

    function addToCart(name, price) {
        cart.push(name);
        total += price;
        updateUI();
    }

    function updateUI() {
        document.getElementById('cart-count').innerText = cart.length;
        document.getElementById('total-price').innerText = total;
        const list = document.getElementById('cart-items');
        const newItem = document.createElement('li');
        newItem.innerText = cart[cart.length - 1];
        list.appendChild(newItem);
    }
</script>

</body>
</html>
